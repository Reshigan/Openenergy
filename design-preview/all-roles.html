var f=document.getElementById('frame');
function show(k,btn){
  document.querySelectorAll('.rb').forEach(b=>b.classList.toggle('active',b===btn));
  f.src='data:text/html;base64,'+DATA[k];
}
document.querySelectorAll('.rb').forEach(b=>b.addEventListener('click',function(){show(this.dataset.role,this);}));
var init=document.querySelector('.rb[data-init]');show(init.dataset.role,init);
</script>
