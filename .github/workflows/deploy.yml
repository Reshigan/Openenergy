name: CI/CD - Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: open-energy-platform/pages/package-lock.json

      - name: Install frontend dependencies
        working-directory: open-energy-platform/pages
        run: npm ci

      - name: Build frontend
        working-directory: open-energy-platform/pages
        run: npm run build

      - name: Verify build output
        working-directory: open-energy-platform/pages
        run: |
          echo "Build output:" && ls -la dist/
          test -f dist/index.html && echo "index.html found"

      - name: Install Functions dependencies (hono, zod, bcryptjs)
        working-directory: open-energy-platform
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Run unit tests (Vitest)
        working-directory: open-energy-platform
        run: npm test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: open-energy-platform/pages/dist
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: production
      url: https://oe.vantax.co.za
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: open-energy-platform/pages/package-lock.json

      - name: Install frontend + build (reproduce)
        working-directory: open-energy-platform/pages
        run: |
          npm ci
          npm run build

      - name: Install Functions dependencies (hono, zod, bcryptjs)
        working-directory: open-energy-platform
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Pre-migration column reconcile (idempotent)
        # Some recent migrations (e.g. 085) INSERT rows that reference
        # columns originally added by 020 (force-skipped on prod per
        # GLR §1.1). Add them defensively before applying migrations so
        # the INSERTs find the column they expect. Treat "duplicate
        # column name" as benign — same pattern as the 050 reconcile
        # step below.
        working-directory: open-energy-platform
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          ok=true
          attempt() {
            local desc="$1"; local sql="$2"
            echo "::group::$desc"
            out=$(npx wrangler@4 d1 execute open-energy-db --remote --command "$sql" -y 2>&1)
            rc=$?
            echo "$out"
            if [ $rc -ne 0 ]; then
              if echo "$out" | grep -qE "duplicate column name|already exists|SQLITE_CONSTRAINT_UNIQUE|Not currently importing"; then
                echo "::warning::$desc already applied"
              elif echo "$out" | grep -qE "no such column|no such table"; then
                echo "::warning::$desc skipped (depends on schema that does not exist on prod yet)"
              else
                echo "::error::$desc failed"
                ok=false
              fi
            fi
            echo "::endgroup::"
          }
          # posted_at, time_in_force, shard_key were supposed to come from
          # migration 020 (force-skipped on prod). Migration 085 binds all
          # three on INSERT into trade_orders, so the columns must exist
          # before 085 runs.
          attempt "ALTER trade_orders ADD posted_at"      "ALTER TABLE trade_orders ADD COLUMN posted_at TEXT;"
          attempt "ALTER trade_orders ADD time_in_force"  "ALTER TABLE trade_orders ADD COLUMN time_in_force TEXT;"
          attempt "ALTER trade_orders ADD shard_key"      "ALTER TABLE trade_orders ADD COLUMN shard_key TEXT;"
          $ok || exit 1

      - name: Apply D1 migrations (remote)
        # Prod D1 was force-applied out of band for migrations 019-048
        # (see GO_LIVE_READINESS.md §1.1) — the partial state means
        # replaying earlier migrations either no-ops or errors with
        # "no such column" depending on which order they ran in.
        #
        # On every deploy we therefore apply only:
        #   001-018  : the original CI-tracked baseline
        #   049+     : everything introduced after the GLR baseline,
        #              which is what this and future deploys actually
        #              need to land.
        # Duplicate-column / already-exists is treated as a warning
        # since it just means the migration was already force-applied.
        # Any other error is fatal.
        working-directory: open-energy-platform
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          status=0
          # Build the file list: 001-018 + 049 + 051+ (skip the
          # 019-048 out-of-band band per GLR §1.1; skip 050 because
          # its CREATE INDEX on (status, good_till) references a column
          # 020 was supposed to add but didn't land on prod).
          # 049 is pure CREATE TABLE IF NOT EXISTS — safe to land. 050's
          # ALTER + CREATE INDEX are reconciled per-statement in the
          # next step.
          files=$(ls migrations/*.sql | sort -V | awk -F/ '{
            n = substr($NF, 1, 3) + 0
            # Skip 019-048 (force-applied out-of-band per GLR §1.1).
            # Skip 050 (per-statement reconcile in next step).
            # Skip 380-381 (esums_projects band — rolled back on first run
            #   due to om_sites FK conflict; handled in ESUMS reconcile step).
            # Skip 383 (manufacturer column ALTER — per-statement reconcile).
            if (n <= 18 || n == 49 || (n >= 51 && n < 380) || (n == 382) || n >= 384) print
          }')
          for f in $files; do
            echo "::group::Applying $f"
            out=$(npx wrangler@4 d1 execute open-energy-db --remote --file="$f" -y 2>&1)
            rc=$?
            echo "$out"
            if [ $rc -ne 0 ]; then
              if echo "$out" | grep -qE "duplicate column name|already exists|SQLITE_CONSTRAINT_UNIQUE|Not currently importing"; then
                echo "::warning::idempotent re-run on $f — already applied, continuing"
              else
                echo "::error::migration failed: $f"
                status=1
                break
              fi
            fi
            echo "::endgroup::"
          done
          exit $status

      - name: Reconcile 050 trade-order columns (per-statement, idempotent)
        # SQLite ALTER TABLE ADD COLUMN has no IF NOT EXISTS form, so each
        # column gets its own --command call and we treat
        # "duplicate column name" as a benign re-run. Adds the columns
        # migration 050 needs; subsequent CREATE INDEX then attaches the
        # status+good_till index if the column landed cleanly.
        working-directory: open-energy-platform
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          ok=true
          attempt() {
            local desc="$1"; local sql="$2"
            echo "::group::$desc"
            out=$(npx wrangler@4 d1 execute open-energy-db --remote --command "$sql" -y 2>&1)
            rc=$?
            echo "$out"
            if [ $rc -ne 0 ]; then
              if echo "$out" | grep -qE "duplicate column name|already exists|SQLITE_CONSTRAINT_UNIQUE|Not currently importing"; then
                echo "::warning::$desc already applied"
              elif echo "$out" | grep -qE "no such column|no such table"; then
                echo "::warning::$desc skipped (depends on schema that does not exist on prod yet)"
              else
                echo "::error::$desc failed"
                ok=false
              fi
            fi
            echo "::endgroup::"
          }
          # trade_orders L4 columns from migration 050
          attempt "ALTER trade_orders ADD post_only"          "ALTER TABLE trade_orders ADD COLUMN post_only INTEGER NOT NULL DEFAULT 0;"
          attempt "ALTER trade_orders ADD reduce_only"        "ALTER TABLE trade_orders ADD COLUMN reduce_only INTEGER NOT NULL DEFAULT 0;"
          attempt "ALTER trade_orders ADD stop_trigger_price" "ALTER TABLE trade_orders ADD COLUMN stop_trigger_price REAL;"
          attempt "ALTER trade_orders ADD display_size_mwh"   "ALTER TABLE trade_orders ADD COLUMN display_size_mwh REAL;"
          attempt "ALTER trade_orders ADD amend_count"        "ALTER TABLE trade_orders ADD COLUMN amend_count INTEGER NOT NULL DEFAULT 0;"
          # good_till was supposed to come from migration 020; add it
          # defensively so the expiry sweeper has a column to look at.
          attempt "ALTER trade_orders ADD good_till"          "ALTER TABLE trade_orders ADD COLUMN good_till TEXT;"
          # trade_order_amendments table from 050 (pure CREATE — safe).
          attempt "CREATE trade_order_amendments" "CREATE TABLE IF NOT EXISTS trade_order_amendments (id TEXT PRIMARY KEY, order_id TEXT NOT NULL, amended_by TEXT NOT NULL, amended_at TEXT NOT NULL DEFAULT (datetime('now')), prev_price REAL, new_price REAL, prev_volume_mwh REAL NOT NULL, new_volume_mwh REAL NOT NULL, prev_remaining_mwh REAL NOT NULL, new_remaining_mwh REAL NOT NULL, lost_priority INTEGER NOT NULL DEFAULT 0, reason TEXT);"
          attempt "INDEX trade_order_amendments_order" "CREATE INDEX IF NOT EXISTS idx_trade_order_amendments_order ON trade_order_amendments (order_id, amended_at DESC);"
          # Indexes that depend on the columns we just added.
          attempt "INDEX trade_orders status+good_till" "CREATE INDEX IF NOT EXISTS idx_trade_orders_status_goodtill ON trade_orders (status, good_till);"
          # remaining_volume_mwh is referenced by several routes (and is
          # what migration 020 tried to add but failed). Defensively add
          # it so the matching engine + order-detail endpoints work.
          attempt "ALTER trade_orders ADD remaining_volume_mwh" "ALTER TABLE trade_orders ADD COLUMN remaining_volume_mwh REAL;"
          $ok || exit 1

      - name: Reconcile ESUMS 380-381 schema (per-statement, idempotent)
        # Migrations 380 + 381 rolled back on first deploy because D1 runs
        # each file as a transaction — the ALTER TABLE om_sites ADD COLUMN
        # project_id failed (column already existed), rolling back the whole
        # file including CREATE TABLE esums_projects.
        # We apply each statement individually so duplicate-column / already-
        # exists errors don't abort the remaining DDL.
        working-directory: open-energy-platform
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          ok=true
          attempt() {
            local desc="$1"; local sql="$2"
            echo "::group::$desc"
            out=$(npx wrangler@4 d1 execute open-energy-db --remote --command "$sql" -y 2>&1)
            rc=$?
            echo "$out"
            if [ $rc -ne 0 ]; then
              if echo "$out" | grep -qE "duplicate column name|already exists|SQLITE_CONSTRAINT_UNIQUE|Not currently importing"; then
                echo "::warning::$desc already applied"
              elif echo "$out" | grep -qE "no such column|no such table"; then
                echo "::warning::$desc skipped (depends on schema not yet on prod)"
              else
                echo "::error::$desc failed"
                ok=false
              fi
            fi
            echo "::endgroup::"
          }
          # ── 380: esums_projects table ────────────────────────────────────
          attempt "CREATE esums_projects" "CREATE TABLE IF NOT EXISTS esums_projects (id TEXT PRIMARY KEY, participant_id TEXT NOT NULL REFERENCES participants(id) ON DELETE CASCADE, name TEXT NOT NULL, description TEXT, shard_key TEXT UNIQUE, site_count INTEGER NOT NULL DEFAULT 0, total_capacity_kw REAL NOT NULL DEFAULT 0, status TEXT NOT NULL DEFAULT 'active' CHECK (status IN ('active','archived')), created_at TEXT NOT NULL DEFAULT (datetime('now')), updated_at TEXT NOT NULL DEFAULT (datetime('now')));"
          attempt "INDEX esums_projects_participant" "CREATE INDEX IF NOT EXISTS idx_esums_projects_participant ON esums_projects(participant_id);"
          # ── 381: project_type + ipp_project_id columns ───────────────────
          attempt "ALTER esums_projects ADD project_type" "ALTER TABLE esums_projects ADD COLUMN project_type TEXT NOT NULL DEFAULT 'standalone' CHECK(project_type IN ('ipp','standalone'));"
          attempt "ALTER esums_projects ADD ipp_project_id" "ALTER TABLE esums_projects ADD COLUMN ipp_project_id TEXT REFERENCES ipp_projects(id) ON DELETE SET NULL;"
          attempt "INDEX esums_projects_ipp" "CREATE INDEX IF NOT EXISTS idx_esums_projects_ipp ON esums_projects(ipp_project_id);"
          # ── 380: om_sites FK (may already exist — duplicate is benign) ───
          attempt "ALTER om_sites ADD project_id" "ALTER TABLE om_sites ADD COLUMN project_id TEXT REFERENCES esums_projects(id) ON DELETE SET NULL;"
          attempt "INDEX om_sites_project" "CREATE INDEX IF NOT EXISTS idx_om_sites_project ON om_sites(project_id);"
          # ── 380: esums_telemetry table ───────────────────────────────────
          attempt "CREATE esums_telemetry" "CREATE TABLE IF NOT EXISTS esums_telemetry (id TEXT PRIMARY KEY, device_id TEXT NOT NULL, site_id TEXT NOT NULL, project_id TEXT, ts TEXT NOT NULL, ac_kw REAL, dc_kw REAL, yield_kwh REAL, interval_kwh REAL, voltage_v REAL, current_a REAL, frequency_hz REAL, temperature_c REAL, irradiance_w_m2 REAL, status_code TEXT, quality TEXT NOT NULL DEFAULT 'valid');"
          attempt "INDEX esums_telemetry_device_ts" "CREATE INDEX IF NOT EXISTS idx_esums_tel_device_ts ON esums_telemetry(device_id, ts DESC);"
          attempt "INDEX esums_telemetry_site_ts" "CREATE INDEX IF NOT EXISTS idx_esums_tel_site_ts ON esums_telemetry(site_id, ts DESC);"
          # ── 383: manufacturer column on solax_stations ───────────────────
          attempt "ALTER solax_stations ADD manufacturer" "ALTER TABLE solax_stations ADD COLUMN manufacturer TEXT NOT NULL DEFAULT 'solax';"
          attempt "INDEX solax_stations_manufacturer" "CREATE INDEX IF NOT EXISTS idx_solax_stations_manufacturer ON solax_stations(participant_id, manufacturer);"
          # ── 383: manufacturer_credentials table ──────────────────────────
          attempt "CREATE manufacturer_credentials" "CREATE TABLE IF NOT EXISTS manufacturer_credentials (id TEXT PRIMARY KEY, participant_id TEXT NOT NULL REFERENCES participants(id) ON DELETE CASCADE, manufacturer TEXT NOT NULL, auth_type TEXT NOT NULL, client_id TEXT, client_secret TEXT, api_key TEXT, token TEXT, username TEXT, password TEXT, access_token TEXT, token_expires_at TEXT, base_url TEXT, site_id TEXT, extra_config TEXT, status TEXT NOT NULL DEFAULT 'active' CHECK(status IN ('active','inactive','error')), last_tested_at TEXT, last_error TEXT, created_at TEXT NOT NULL, updated_at TEXT NOT NULL);"
          attempt "INDEX manufacturer_credentials_unique" "CREATE UNIQUE INDEX IF NOT EXISTS idx_manufacturer_creds_unique ON manufacturer_credentials(participant_id, manufacturer);"
          attempt "INDEX manufacturer_credentials_participant" "CREATE INDEX IF NOT EXISTS idx_manufacturer_creds_participant ON manufacturer_credentials(participant_id);"
          # ── 383: station_telemetry_snapshot table ─────────────────────────
          attempt "CREATE station_telemetry_snapshot" "CREATE TABLE IF NOT EXISTS station_telemetry_snapshot (station_id TEXT PRIMARY KEY REFERENCES solax_stations(id) ON DELETE CASCADE, ts TEXT NOT NULL, ac_kw REAL, dc_kw REAL, daily_kwh REAL, total_kwh REAL, battery_soc REAL, temperature_c REAL, online INTEGER NOT NULL DEFAULT 0, raw_json TEXT, updated_at TEXT NOT NULL);"
          $ok || exit 1

      - name: Deploy Worker (oe.vantax.co.za)
        # The Worker carries the custom domain and the /api/* routes,
        # with pages/dist served via the ASSETS binding (see wrangler.toml).
        # GO_LIVE_READINESS.md §3.3 flagged that the legacy Pages project
        # is still listening on the same repo push — we keep the pages-
        # deploy step below for that until it's decommissioned, but the
        # Worker is the source of truth.
        working-directory: open-energy-platform
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@4 deploy

      - name: Deploy Pages (legacy — frontend mirror)
        working-directory: open-energy-platform
        # Worker on oe.vantax.co.za is the source of truth; this mirror is
        # best-effort and has been failing on CF Pages API "Invalid commit
        # message" UTF-8 validation. Don't fail the job on mirror errors.
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@4 pages deploy pages/dist \
            --project-name=open-energy-platform \
            --branch=main \
            --commit-dirty=true
