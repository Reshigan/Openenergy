name: CI/CD - Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: open-energy-platform/pages/package-lock.json

      - name: Install frontend dependencies
        working-directory: open-energy-platform/pages
        run: npm ci

      - name: Build frontend
        working-directory: open-energy-platform/pages
        run: npm run build

      - name: Verify build output
        working-directory: open-energy-platform/pages
        run: |
          echo "Build output:" && ls -la dist/
          test -f dist/index.html && echo "index.html found"

      - name: Install Functions dependencies (hono, zod, bcryptjs)
        working-directory: open-energy-platform
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Run unit tests (Vitest)
        working-directory: open-energy-platform
        run: npm test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: open-energy-platform/pages/dist
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: production
      url: https://oe.vantax.co.za
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: open-energy-platform/pages/package-lock.json

      - name: Install frontend + build (reproduce)
        working-directory: open-energy-platform/pages
        run: |
          npm ci
          npm run build

      - name: Install Functions dependencies (hono, zod, bcryptjs)
        working-directory: open-energy-platform
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Apply D1 migrations (remote)
        # Prod D1 was force-applied out of band for migrations 019-048
        # (see GO_LIVE_READINESS.md §1.1) — the partial state means
        # replaying earlier migrations either no-ops or errors with
        # "no such column" depending on which order they ran in.
        #
        # On every deploy we therefore apply only:
        #   001-018  : the original CI-tracked baseline
        #   049+     : everything introduced after the GLR baseline,
        #              which is what this and future deploys actually
        #              need to land.
        # Duplicate-column / already-exists is treated as a warning
        # since it just means the migration was already force-applied.
        # Any other error is fatal.
        working-directory: open-energy-platform
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          status=0
          # Build the file list: 001-018 + 051+ (skip the
          # out-of-band band 019-050). 049+050 add trade-order columns
          # that depend on `good_till` from 020 — which is missing on
          # prod, so those two error too. A separate maintenance PR
          # will reconcile that band; today we only need 051-055 (the
          # new L4 tables for Settlement / Trading / Lender) to land.
          files=$(ls migrations/*.sql | sort -V | awk -F/ '{
            n = substr($NF, 1, 3) + 0
            if (n <= 18 || n >= 51) print
          }')
          for f in $files; do
            echo "::group::Applying $f"
            out=$(npx wrangler@4 d1 execute open-energy-db --remote --file="$f" -y 2>&1)
            rc=$?
            echo "$out"
            if [ $rc -ne 0 ]; then
              if echo "$out" | grep -qE "duplicate column name|already exists|SQLITE_CONSTRAINT_UNIQUE"; then
                echo "::warning::idempotent re-run on $f — already applied, continuing"
              else
                echo "::error::migration failed: $f"
                status=1
                break
              fi
            fi
            echo "::endgroup::"
          done
          exit $status

      - name: Deploy Pages (frontend + Functions)
        working-directory: open-energy-platform
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@4 pages deploy pages/dist \
            --project-name=open-energy-platform \
            --branch=main \
            --commit-dirty=true
