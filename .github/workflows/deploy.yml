name: CI/CD - Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: open-energy-platform/pages/package-lock.json

      - name: Install frontend dependencies
        working-directory: open-energy-platform/pages
        run: npm ci

      - name: Build frontend
        working-directory: open-energy-platform/pages
        run: npm run build

      - name: Verify build output
        working-directory: open-energy-platform/pages
        run: |
          echo "Build output:" && ls -la dist/
          test -f dist/index.html && echo "index.html found"

      - name: Install Functions dependencies (hono, zod, bcryptjs)
        working-directory: open-energy-platform
        run: npm install --no-audit --no-fund

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: open-energy-platform/pages/dist
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: production
      url: https://oe.vantax.co.za
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: open-energy-platform/pages/package-lock.json

      - name: Install frontend + build (reproduce)
        working-directory: open-energy-platform/pages
        run: |
          npm ci
          npm run build

      - name: Install Functions dependencies (hono, zod, bcryptjs)
        working-directory: open-energy-platform
        run: npm install --no-audit --no-fund

      - name: Apply D1 migrations (remote)
        working-directory: open-energy-platform
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@4 d1 execute open-energy-db --remote --file=./migrations/001_core.sql -y
          npx wrangler@4 d1 execute open-energy-db --remote --file=./migrations/002_domain.sql -y
          npx wrangler@4 d1 execute open-energy-db --remote --file=./migrations/003_seed.sql -y
          npx wrangler@4 d1 execute open-energy-db --remote --file=./migrations/004_contract_templates.sql -y
          npx wrangler@4 d1 execute open-energy-db --remote --file=./migrations/005_ai_seed.sql -y
          npx wrangler@4 d1 execute open-energy-db --remote --file=./migrations/006_contract_signatories.sql -y
          npx wrangler@4 d1 execute open-energy-db --remote --file=./migrations/007_lois.sql -y
          npx wrangler@4 d1 execute open-energy-db --remote --file=./migrations/008_platform_admin.sql -y
          npx wrangler@4 d1 execute open-energy-db --remote --file=./migrations/009_seed_imbalance.sql -y
          npx wrangler@4 d1 execute open-energy-db --remote --file=./migrations/010_auth_hardening.sql -y
          npx wrangler@4 d1 execute open-energy-db --remote --file=./migrations/011_tenants_and_admin_crud.sql -y
          npx wrangler@4 d1 execute open-energy-db --remote --file=./migrations/012_support_role.sql -y

      - name: Deploy Pages (frontend + Functions)
        working-directory: open-energy-platform
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@4 pages deploy pages/dist \
            --project-name=open-energy-platform \
            --branch=main \
            --commit-dirty=true
