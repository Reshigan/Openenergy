<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 280" role="img" aria-label="Consolidated Energy Cockpit">
  <title>Consolidated Energy Cockpit</title>
  <defs>
    <linearGradient id="bField" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16365A"/>
      <stop offset="1" stop-color="#0B2034"/>
    </linearGradient>
    <linearGradient id="bGold" x1="0.15" y1="0.1" x2="0.85" y2="0.95">
      <stop offset="0" stop-color="#F8C152"/>
      <stop offset="1" stop-color="#DC8417"/>
    </linearGradient>
  </defs>
  <!-- Mark -->
  <g transform="translate(40 40) scale(2.0)">
    <rect x="0" y="0" width="100" height="100" rx="23" fill="url(#bField)"/>
    <path d="M83.66 45.27 A34 34 0 1 1 60.5 17.66" fill="none" stroke="url(#bGold)"
          stroke-width="9.5" stroke-linecap="round"/>
    <polygon points="45.5,49.8 69,26 54.5,56.2" fill="url(#bGold)"/>
    <circle cx="50" cy="53" r="6.6" fill="url(#bGold)"/>
    <circle cx="50" cy="53" r="2.7" fill="#0B2034"/>
  </g>
  <!-- Wordmark -->
  <g font-family="'IBM Plex Sans', 'Inter', system-ui, sans-serif">
    <text x="270" y="118" fill="#102E4D" font-size="84" font-weight="800" letter-spacing="14">CEC</text>
    <text x="272" y="178" fill="#5C6B7C" font-size="29" font-weight="600" letter-spacing="5.5">CONSOLIDATED ENERGY COCKPIT</text>
    <rect x="274" y="200" width="118" height="5" rx="2.5" fill="url(#bGold)"/>
    <text x="404" y="208" fill="#8A97A6" font-size="22" font-weight="500" letter-spacing="2">SOUTH AFRICAN ENERGY EXCHANGE</text>
  </g>
</svg>
