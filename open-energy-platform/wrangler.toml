name = "open-energy-platform"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Worker-with-static-assets deployment.
#
# Pre-2024 this project was Cloudflare Pages + Pages Functions. We moved to
# the unified Worker model because Pages Functions don't natively support
# the `export default { fetch, scheduled }` shape used by src/index.ts
# (required for cron triggers + Durable Object exports).
#
# The Worker handles /api/* via the Hono app in src/index.ts; any path not
# matched by an API route falls through to the ASSETS binding which serves
# the React SPA from pages/dist. Deploy via `wrangler deploy`.
main = "src/index.ts"

[assets]
directory = "pages/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
ENVIRONMENT = "production"
PLATFORM_NAME = "Open Energy"
DOMAIN = "oe.vantax.co.za"
APP_BASE_URL = "https://oe.vantax.co.za"
# Microsoft Entra ID SSO (client ID + tenant ID are semi-public and safe to
# commit; AZURE_AD_CLIENT_SECRET must be set via `wrangler secret put` and
# is never committed).
AZURE_AD_CLIENT_ID = "0a0bcbd9-afcb-44b9-b0ad-16e1da612f98"
AZURE_AD_TENANT_ID = "998b123c-e559-479d-bbb9-cf3330469a73"
AZURE_AD_REDIRECT_URI = "https://oe.vantax.co.za/api/auth/sso/microsoft/callback"

[[r2_buckets]]
binding = "R2"
bucket_name = "open-energy-vault"

[[kv_namespaces]]
binding = "KV"
id = "aa6172248d474199a39c5f6aeafb2ec2"

[[d1_databases]]
binding = "DB"
database_name = "open-energy-db"
database_id = "e0665a44-2f3e-4ab6-8ec5-101af4e8f951"
migrations_dir = "migrations"

# Workers AI binding for role-aware AI analysis (offtaker bill optimisation,
# IPP project simulation, carbon fund NAV, lender cashflow, trader signals,
# regulator compliance narrative). Uses Cloudflare-hosted models; no external
# keys required.
[ai]
binding = "AI"

# Durable Object: price-time-priority matching engine. One DO per shard
# (energy_type × delivery_day) so writes into the same book are serialised
# without distributed locks. Classes live in src/do/*.ts and are exported
# from src/index.ts so wrangler can resolve them.
[[durable_objects.bindings]]
name = "ORDER_BOOK"
class_name = "OrderBook"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["OrderBook"]

# Metering shard — a second D1 dedicated to the hot current-month
# metering_readings writes. When bound it isolates ingest load from the
# main DB, keeping trade/settlement queries fast. Create with:
#   wrangler d1 create open-energy-metering-current
# then uncomment below with the returned id. Archive shards
# (METERING_DB_ARCHIVE_YYYY_MM) follow the same pattern and are created
# monthly by an operator job.
# [[d1_databases]]
# binding = "METERING_DB_CURRENT"
# database_name = "open-energy-metering-current"
# database_id = "<id-returned-by-wrangler-d1-create>"

# Scheduled handlers — the Worker's `scheduled()` export in src/index.ts
# dispatches by cron pattern. Each entry maps to a named job inside the
# handler. Cloudflare runs these independently of HTTP traffic.
[triggers]
crons = [
  "*/15 * * * *",   # 15-min: surveillance scan, order-book depth snapshot
  "0 * * * *",      # hourly: mark-price VWAP run
  "5 0 * * *",      # 00:05 daily: metering rollup, ONA rollup, audit archive prep
  "10 0 * * *",     # 00:10 daily: settlement run for previous day
  "30 0 * * *",     # 00:30 daily: usage snapshot, margin call run
  "0 2 1 * *"       # 02:00 on day 1 of month: platform invoice run
]
