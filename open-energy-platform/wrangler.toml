name = "open-energy-platform"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "pages/dist"

[vars]
ENVIRONMENT = "production"
PLATFORM_NAME = "Open Energy"
DOMAIN = "oe.vantax.co.za"
APP_BASE_URL = "https://oe.vantax.co.za"
# Microsoft Entra ID SSO (client ID + tenant ID are semi-public and safe to
# commit; AZURE_AD_CLIENT_SECRET must be set via `wrangler secret put` and
# is never committed).
AZURE_AD_CLIENT_ID = "0a0bcbd9-afcb-44b9-b0ad-16e1da612f98"
AZURE_AD_TENANT_ID = "998b123c-e559-479d-bbb9-cf3330469a73"
AZURE_AD_REDIRECT_URI = "https://oe.vantax.co.za/api/auth/sso/microsoft/callback"

[[r2_buckets]]
binding = "R2"
bucket_name = "open-energy-vault"

[[kv_namespaces]]
binding = "KV"
id = "aa6172248d474199a39c5f6aeafb2ec2"

[[d1_databases]]
binding = "DB"
database_name = "open-energy-db"
database_id = "e0665a44-2f3e-4ab6-8ec5-101af4e8f951"

# Workers AI binding for role-aware AI analysis (offtaker bill optimisation,
# IPP project simulation, carbon fund NAV, lender cashflow, trader signals,
# regulator compliance narrative). Uses Cloudflare-hosted models; no external
# keys required.
[ai]
binding = "AI"
