name = "open-energy-platform"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Worker-with-static-assets deployment.
#
# Pre-2024 this project was Cloudflare Pages + Pages Functions. We moved to
# the unified Worker model because Pages Functions don't natively support
# the `export default { fetch, scheduled }` shape used by src/index.ts
# (required for cron triggers + Durable Object exports).
#
# The Worker handles /api/* via the Hono app in src/index.ts; any path not
# matched by an API route falls through to the ASSETS binding which serves
# the React SPA from pages/dist. Deploy via `wrangler deploy`.
main = "src/index.ts"

# workers.dev URL stays enabled as a fallback target for smoke tests.
workers_dev = true

# Production custom domain. The orphan CNAME left over from the legacy Pages
# deployment was removed via the Cloudflare Global API; this binding now
# provisions DNS + cert for the Worker on next deploy.
[[routes]]
pattern = "oe.vantax.co.za"
custom_domain = true

[assets]
directory = "pages/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
ENVIRONMENT = "production"
PLATFORM_NAME = "Open Energy"
DOMAIN = "oe.vantax.co.za"
APP_BASE_URL = "https://oe.vantax.co.za"
# Demo-env only: 6h access tokens so the ~4h nightly browser suite outlives its
# JWTs (1h tokens expired mid-run → every late-suite spec bounced to /login).
# The live env ([env.live]) deliberately does NOT set this → 1h default.
ACCESS_TOKEN_TTL_SECONDS = "21600"
# Secrets (never committed — provision via `wrangler secret put <NAME>`):
#   wrangler secret put JWT_SECRET          # HS256 fallback HMAC key (≥32 random bytes)
#   wrangler secret put JWT_PRIVATE_KEY_JWK # ES256 P-256 private key JWK (run scripts/generate-jwt-keys.mjs)
#   wrangler secret put JWT_PUBLIC_KEY_JWK  # ES256 P-256 public key JWK  (same script)
#   wrangler secret put BACKUP_TOKEN        # Long-lived admin bootstrap token (UUID v4)
#   wrangler secret put AZURE_AD_CLIENT_SECRET
#   wrangler secret put SOLAX_CLIENT_SECRET
#
# Microsoft Entra ID SSO (client ID + tenant ID are semi-public and safe to
# commit; AZURE_AD_CLIENT_SECRET must be set via `wrangler secret put` and
# is never committed).
AZURE_AD_CLIENT_ID = "0a0bcbd9-afcb-44b9-b0ad-16e1da612f98"
AZURE_AD_TENANT_ID = "998b123c-e559-479d-bbb9-cf3330469a73"
AZURE_AD_REDIRECT_URI = "https://oe.vantax.co.za/api/auth/sso/microsoft/callback"
# SolaX Cloud OpenAPI — EU endpoint, C&I businessType=4
# Client secret should be set via `wrangler secret put SOLAX_CLIENT_SECRET`
SOLAX_BASE_URL = "https://openapi-eu.solaxcloud.com"
SOLAX_CLIENT_ID = "3299754f484a4bde8bfe810e1bd166d6"

[[r2_buckets]]
binding = "R2"
bucket_name = "open-energy-vault"

[[kv_namespaces]]
binding = "KV"
id = "aa6172248d474199a39c5f6aeafb2ec2"

[[d1_databases]]
binding = "DB"
database_name = "open-energy-db"
database_id = "e0665a44-2f3e-4ab6-8ec5-101af4e8f951"
migrations_dir = "migrations"

# Workers AI binding for role-aware AI analysis (offtaker bill optimisation,
# IPP project simulation, carbon fund NAV, lender cashflow, trader signals,
# regulator compliance narrative). Uses Cloudflare-hosted models; no external
# keys required.
[ai]
binding = "AI"

# Durable Object: price-time-priority matching engine. One DO per shard
# (energy_type × delivery_day) so writes into the same book are serialised
# without distributed locks. Classes live in src/do/*.ts and are exported
# from src/index.ts so wrangler can resolve them.
[[durable_objects.bindings]]
name = "ORDER_BOOK"
class_name = "OrderBook"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["OrderBook"]

# Metering shard — a second D1 dedicated to the hot current-month
# metering_readings writes. When bound it isolates ingest load from the
# main DB, keeping trade/settlement queries fast. Create with:
#   wrangler d1 create open-energy-metering-current
# then uncomment below with the returned id. Archive shards
# (METERING_DB_ARCHIVE_YYYY_MM) follow the same pattern and are created
# monthly by an operator job. Full procedure (gated remote-infra action):
#   docs/runbooks/metering-shard-activation.md
# [[d1_databases]]
# binding = "METERING_DB_CURRENT"
# database_name = "open-energy-metering-current"
# database_id = "<id-returned-by-wrangler-d1-create>"

# ── Esums Telemetry Tier 2: Dedicated telemetry D1 ────────────────────────────
# Isolates high-frequency sensor writes from the main business-logic DB.
# Activate when you have 10+ sites or want to keep om_telemetry off the
# main 10 GB envelope.
#   wrangler d1 create esums-telemetry
# [[d1_databases]]
# binding = "ESUMS_TELEMETRY_DB"
# database_name = "esums-telemetry"
# database_id = "<id-returned-by-wrangler-d1-create>"
# migrations_dir = "migrations"   # migration 380 creates esums_telemetry table

# ── Esums Telemetry Tier 3: Per-project D1 shard ──────────────────────────────
# One D1 per large project (>50 sites). Set shard_key on the esums_projects row
# then add the binding here. The telemetry router resolves it automatically.
#   wrangler d1 create esums-myproject
# [[d1_databases]]
# binding = "ESUMS_DB_MYPROJECT"      ← uppercase shard_key
# database_name = "esums-myproject"
# database_id = "<id-returned-by-wrangler-d1-create>"

# ── Esums Telemetry Tier 4: Analytics Engine (unlimited scale side-write) ──────
# Captures every data point for long-term analytics and dashboards.
# Query via CF Analytics Engine SQL API — reads do NOT go through this Worker.
# Activate: uncomment and redeploy. No wrangler create command needed.
# [[analytics_engine_datasets]]
# binding = "TELEMETRY"
# dataset = "esums_telemetry"

# ── Tier 5: Hyperdrive → Postgres (transaction-heavy workloads) ───────────────
# Use for tables that need true MVCC, window functions, or > 10 GB.
# Recommended: Neon (serverless Postgres, instant branching, SA-proxied).
#   wrangler hyperdrive create open-energy-pg \
#     --connection-string "postgres://user:pass@neon-host:5432/open_energy"
# Then route affected tables via src/utils/db-adapter.ts.
# [[hyperdrive]]
# binding = "HYPERDRIVE"
# id = "<id-returned-by-wrangler-hyperdrive-create>"

# ── Ecosystem cascade Queue (national-scale async fan-out) ────────────────────
# fireCascade enqueues PlatformEvents to this queue; the consumer runs the
# registry/fee/analytics layers off the HTTP request path at national scale.
[[queues.producers]]
binding = "QUEUE"
queue = "open-energy-cascade"

[[queues.consumers]]
queue = "open-energy-cascade"
max_batch_size = 50
max_batch_timeout = 5

# Scheduled handlers — the Worker's `scheduled()` export in src/index.ts
# dispatches by cron pattern. Each entry maps to a named job inside the
# handler. Cloudflare runs these independently of HTTP traffic.
[triggers]
crons = [
  "*/15 * * * *",   # 15-min: surveillance scan, order-book depth snapshot
  "0 * * * *",      # hourly: mark-price VWAP run
  "15 0 * * *",     # 00:15 daily: W112 IPP WBS & Gantt schedule-health recompute (CPI/SPI/SV/CV + health band)
  "20 0 * * *",     # 00:20 daily: W113 IPP Cost & EVM nightly recompute (CPI/SPI/EAC/TCPI/VAC + contingency/MR remaining pct + health band)
  "25 0 * * *",     # 00:25 daily: W114 IPP Document Control IDC matrix recompute (idc_status + completeness + doc_health_band)
  "5 0 * * *",      # 00:05 daily: metering rollup, ONA rollup, audit archive prep
  "10 0 * * *",     # 00:10 daily: settlement run for previous day
  "30 0 * * *",     # 00:30 daily: usage snapshot, margin call run
  "35 0 * * *",     # 00:35 daily: W116 IPP RFI nightly aging refresh (rfi_age_days + completeness + rfi_health_band)
  "40 0 * * *",     # 00:40 daily: W117 IPP Change Order cumulative_change_value_pct + cap_band + aging refresh
  "45 0 * * *",     # 00:45 daily: watershed anomaly scan + W118 audit-chain daily reconcile + chain-link verify
  "50 0 * * *",     # 00:50 daily: W119 regulator-export-pack LIVE score refresh (completeness/xbrl/esg/controls/integrity + health band + days_to_quarterly_cutoff)
  "55 0 * * *",     # 00:55 daily: W120 reconciliation-attestation LIVE variance recompute (4 scoring indexes + attestation_health_band + days_to_quarterly_attestation)
  "58 0 * * *",     # 00:58 daily: W121 control-environment-audit nightly evidence-coverage recompute (4 scoring indexes + control_health_band + days_to_quarterly_cutoff + days_to_annual_audit)
  "5 * * * *",      # 5 past hourly: W118 audit-chain hourly block proposal (Phase-B opener)
  "0 3 1 1,4,7,10 *", # 03:00 Jan/Apr/Jul/Oct 1st: W118 audit-chain quarterly NERSA/IPPO/SARB export sweep
  "0 2 1 * *",      # 02:00 on day 1 of month: platform invoice run
  "0 4 1 * *",      # 04:00 on day 1 of month: W119 monthly_return regulator-export-pack rollup (flag closing-month packs as regulator_relevant)
  "0 5 1 * *",      # 05:00 on day 1 of month: W120 monthly audit-committee pack rollup (flag closing-month quarterly+annual attestations regulator_relevant)
  "0 6 1 1 *",      # 06:00 on 1 January: W121 annual external-audit cycle opener (raise iso27001_surveillance_audit_due + sox_404_attestation_pending + soc2_type2_period_open per framework)
  "0 6 * * 1",      # Mon 08:00 SAST (06:00 UTC): W131 Stage Gates conditions-aging sweep (flags regulator_relevant on conditions_set_at >90d; Equator IV monitoring requirement)
  "0 7 * * 1",      # Mon 09:00 SAST (07:00 UTC): W122 SCADA connector weekly cert-expiry sweep (60d / 14d revocation warning)
  "30 1 * * *",     # 03:30 SAST (01:30 UTC) daily: W124 STRATE/SWIFT settlement connector reconciliation sweep (4 scoring indexes + aging refresh + cycle_reconciled emit)
  "45 1 * * *",     # 03:45 SAST (01:45 UTC) daily: W125 SAP/Oracle ERP connector reconciliation sweep (control_effectiveness_index + days_to_period_close refresh + period_close_reconciled emit; 15 min after W124 so GL sees fresh settlement totals)
  "0 2 * * *",      # 04:00 SAST (02:00 UTC) daily: W126 CIPC/SARS/NERSA government-filing connector statutory filing-deadline sweep (days_to_next_filing_deadline refresh + <7d flag as regulator_relevant); closes Phase C cron footprint
  "30 2 * * *",     # 04:30 SAST (02:30 UTC) daily: W127 Anomaly-Detection ML Model drift scan (PSI + KS + recon-error p99 + lift drift recompute against calibrated baseline + drift_severity flip + regulator_relevant flag); FIRST Phase-D daily cron
  "0 3 * * *",      # 05:00 SAST (03:00 UTC) daily: W128 RUL Prediction ML Model concordance monitor (Harrell C + time-dependent AUC + Brier + Schoenfeld PH p-value + KM-lift-vs-OLS recompute against baseline; ph_violated flip when p<0.05 + regulator_relevant when concordance below threshold OR PH violated on fleet_systemic); SECOND Phase-D daily cron (30 min after W127 so heavy survival monitor doesn't share airtime)
  "30 3 * * *",     # 05:30 SAST (03:30 UTC) daily: W129 Fault-Fingerprint Multi-Class ML Model class-drift scan (class-PSI argmax distribution drift + per-class confusion drift + novel-class detection rate recompute against calibrated baseline; class_drift_severity flip + regulator_relevant when PSI crosses regulator_reportable_misclass threshold OR previously-unseen fault mode surfaces at fleet_systemic per EU AI Act Art 14); THIRD Phase-D daily cron (30 min after W128 so heavy multi-class drift scan doesn't share airtime with W128 concordance monitor)
  "15 4 * * *",     # 06:15 SAST (04:15 UTC) daily: W130 NTT Comparison Battery NIGHTLY CYCLE RUNNER (refreshes savings_vs_ntt_pct trend + paired_t p-value trend + days_to_next_cycle countdown + flags sustained-below-target when savings negative OR p-value >= 0.10 + counts cycles near due); FOURTH (final) Phase-D daily cron (45 min after W129 - PHASE D 4/4 CLOSED)
  "0 1 1 * *",      # 03:00 SAST (01:00 UTC) monthly 1st-of-month: W130 NTT Comparison Battery CUMULATIVE SAVINGS LEDGER RECONCILIATION (validates cumulative_savings_zar against W71 asset-prognostics control savings ledger; flags regulator_reportable_diversion + emits audit-published event when drift >5% catching drift before it surfaces as Q+1 SARB MA s38 notifiable); Phase-D monthly footprint closer
  "0 15 * * 5",     # Fri 17:00 SAST (15:00 UTC): trading-risk MTD digest
  "0 6 1 * *",      # Day 1 of month 08:00 SAST: CPMI-IOSCO PFMI disclosure
  "0 18 * * *"      # 18:00 SAST (16:00 UTC) daily: W111 P&L attribution T+1 EOD opener
]

# ══════════════════════════════════════════════════════════════════════════════
# LIVE ENVIRONMENT — cec.vantax.co.za (CEC, Consolidated Energy Cockpit)
# ──────────────────────────────────────────────────────────────────────────────
# oe.vantax.co.za stays the DEMO env (top-level config above, demo personas seeded).
# `[env.live]` is the real-org production env: separate Worker, separate D1/KV/queue,
# no demo logins (DEMO_MODE=off). Deploy with: `wrangler deploy --env live`.
# Named environments do NOT inherit bindings/vars/routes/triggers, so every
# binding is redeclared here. R2 is reused (token has no r2:write scope; tenant-
# prefixed keys already isolate live orgs from demo data).
# ══════════════════════════════════════════════════════════════════════════════
[env.live]
name = "cec-energy-platform"
workers_dev = true

[[env.live.routes]]
pattern = "cec.vantax.co.za"
custom_domain = true

[env.live.assets]
directory = "pages/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[env.live.vars]
ENVIRONMENT = "live"
PLATFORM_NAME = "Open Energy"
DOMAIN = "cec.vantax.co.za"
APP_BASE_URL = "https://cec.vantax.co.za"
# DEMO_MODE gates demo personas + the one-click demo password in the SPA login.
# "off" on live: no persona buttons, no Demo@2024! hint, real-org login only.
DEMO_MODE = "off"
AZURE_AD_CLIENT_ID = "0a0bcbd9-afcb-44b9-b0ad-16e1da612f98"
AZURE_AD_TENANT_ID = "998b123c-e559-479d-bbb9-cf3330469a73"
AZURE_AD_REDIRECT_URI = "https://cec.vantax.co.za/api/auth/sso/microsoft/callback"
# SA Goldrush plants are registered on the GLOBAL SolaX base (businessType=4 is
# empty on the EU base — that was the original 0-plant sync bug). Per-org stored
# credentials can still override this via manufacturer_credentials.base_url.
SOLAX_BASE_URL = "https://openapi.solaxcloud.com"
SOLAX_CLIENT_ID = "3299754f484a4bde8bfe810e1bd166d6"
# Platform display/reporting timezone. South African Standard Time (UTC+2, no
# DST). Workers run UTC internally; this drives SA-local rendering/reporting.
PLATFORM_TZ = "Africa/Johannesburg"

# Reuses the demo vault bucket; live keys are tenant-prefixed (t_<slug>/…).
[[env.live.r2_buckets]]
binding = "R2"
bucket_name = "open-energy-vault"

[[env.live.kv_namespaces]]
binding = "KV"
id = "35ec13fbde8c4222bfa1adf1caa1fcae"

[[env.live.d1_databases]]
binding = "DB"
database_name = "cec-energy-db"
database_id = "ec72fd09-00aa-42d7-90b2-8879dbe39943"
migrations_dir = "migrations"

[env.live.ai]
binding = "AI"

[[env.live.durable_objects.bindings]]
name = "ORDER_BOOK"
class_name = "OrderBook"

[[env.live.migrations]]
tag = "v1"
new_sqlite_classes = ["OrderBook"]

[[env.live.queues.producers]]
binding = "QUEUE"
queue = "cec-energy-cascade"

[[env.live.queues.consumers]]
queue = "cec-energy-cascade"
max_batch_size = 50
max_batch_timeout = 5

# Live runs the same scheduled jobs as demo (settlement, rollups, surveillance,
# ML drift, statutory sweeps). Kept identical so live behaviour matches demo.
[env.live.triggers]
crons = [
  "*/15 * * * *",
  "0 * * * *",
  "15 0 * * *",
  "20 0 * * *",
  "25 0 * * *",
  "5 0 * * *",
  "10 0 * * *",
  "30 0 * * *",
  "35 0 * * *",
  "40 0 * * *",
  "45 0 * * *",
  "50 0 * * *",
  "55 0 * * *",
  "58 0 * * *",
  "5 * * * *",
  "0 3 1 1,4,7,10 *",
  "0 2 1 * *",
  "0 4 1 * *",
  "0 5 1 * *",
  "0 6 1 1 *",
  "0 6 * * 1",
  "0 7 * * 1",
  "30 1 * * *",
  "45 1 * * *",
  "0 2 * * *",
  "30 2 * * *",
  "0 3 * * *",
  "30 3 * * *",
  "15 4 * * *",
  "0 1 1 * *",
  "0 15 * * 5",
  "0 6 1 * *",
  "0 18 * * *"
]
